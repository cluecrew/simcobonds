<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bond Risk Dashboard</title>

  <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background:
        linear-gradient(rgba(5, 12, 14, 0.78), rgba(5, 12, 14, 0.88)),
        url("background.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .app {
      padding: 20px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    button {
      background: #222;
      color: white;
      border: 1px solid #444;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 6px;
    }

    button:hover {
      background: #333;
    }

    .panel {
      background: rgba(10, 15, 16, 0.86);
      border: 1px solid #2d3b3d;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(150px, 1fr));
      gap: 12px;
    }

    .kpi-title {
      font-size: 12px;
      color: #c9d1d1;
    }

    .kpi-value {
      font-size: 20px;
      font-weight: bold;
      color: #00ff99;
      margin-top: 5px;
    }

    .buckets {
      display: grid;
      grid-template-columns: repeat(9, minmax(90px, 1fr));
      gap: 10px;
      text-align: center;
    }

    .bucket-title {
      font-size: 12px;
      color: #c9d1d1;
    }

    .bucket-value {
      color: #00ff99;
      font-weight: bold;
      margin-top: 4px;
    }

    textarea {
      width: 100%;
      height: 240px;
      background: #111;
      color: white;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px;
      font-family: Consolas, monospace;
      box-sizing: border-box;
    }

    #paste-panel {
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(20, 24, 26, 0.92);
    }

    th {
      background: #222;
      color: white;
      cursor: pointer;
      padding: 10px;
      border-bottom: 1px solid #444;
      position: sticky;
      top: 0;
    }

    td {
      padding: 9px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    tr:hover {
      background: rgba(0, 255, 153, 0.08);
    }

    .table-wrap {
      max-height: 58vh;
      overflow: auto;
      border-radius: 10px;
    }

    @media (max-width: 1100px) {
      .kpis {
        grid-template-columns: repeat(2, 1fr);
      }

      .buckets {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <button id="toggle-paste">Paste Raw Data</button>
      <button id="load-saved">Load Saved Data</button>
      <button id="clear-data">Clear Saved Data</button>
    </div>

    <div id="paste-panel" class="panel">
      <textarea id="raw-data" placeholder="Paste SimCompanies bond data here..."></textarea>
      <br><br>
      <button id="save-load">Save & Load Data</button>
    </div>

    <div class="panel kpis">
      <div><div class="kpi-title">Total Outstanding</div><div id="kpi-total" class="kpi-value">$0</div></div>
      <div><div class="kpi-title">Callable</div><div id="kpi-callable" class="kpi-value">$0</div></div>
      <div><div class="kpi-title">Recovery Value</div><div id="kpi-recovery" class="kpi-value">$0</div></div>
      <div><div class="kpi-title">Weighted Risk Amount</div><div id="kpi-risk" class="kpi-value">$0</div></div>
      <div><div class="kpi-title">Average Bond Amount</div><div id="kpi-average" class="kpi-value">$0</div></div>
      <div><div class="kpi-title">Total Bond Count</div><div id="kpi-count" class="kpi-value">0</div></div>
    </div>

    <div class="panel buckets" id="bucket-row"></div>

    <div class="panel table-wrap">
      <table>
        <thead>
          <tr id="table-head"></tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <script type="py" src="./main.py" config="./pyscript.json"></script>
</body>
</html>
