<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bond Risk Dashboard</title>

  <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

  <style>

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      color: white;
    }

    body {
      background-image:
        linear-gradient(rgba(5, 12, 14, 0.78),
          rgba(5, 12, 14, 0.88)),
        url("./background.png");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      overflow-x: hidden;
    }

    .app {
      padding: 20px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    button {
      background: #1d1f20;
      color: white;
      border: 1px solid #404040;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.15s;
    }

    button:hover {
      background: #2b2d2f;
      border-color: #666;
    }

    .panel {
      background: rgba(10, 15, 16, 0.84);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      backdrop-filter: blur(4px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    textarea {
      width: 100%;
      height: 260px;

      background: rgba(10,10,10,0.95);
      color: white;

      border: 1px solid #444;
      border-radius: 8px;

      padding: 12px;
      box-sizing: border-box;

      resize: vertical;

      font-family: Consolas, monospace;
      font-size: 13px;
    }

    #paste-panel {
      display: none;
    }

    /* KPI GRID */

    .kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(160px, 1fr));
      gap: 14px;
    }

    .kpi-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 14px;
    }

    .kpi-title {
      font-size: 12px;
      color: #cfd5d6;
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 22px;
      font-weight: bold;
      color: #00ff99;
    }

    /* CALLABLE BUCKETS */

    .buckets {
      display: grid;
      grid-template-columns: repeat(9, minmax(90px, 1fr));
      gap: 10px;
      text-align: center;
    }

    .bucket-box {
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      padding: 10px;
    }

    .bucket-title {
      font-size: 11px;
      color: #d0d6d7;
      margin-bottom: 4px;
    }

    .bucket-value {
      font-size: 16px;
      font-weight: bold;
      color: #00ff99;
    }

    /* TABLE */

    .table-wrap {
      max-height: 60vh;
      overflow: auto;
      border-radius: 10px;
      padding: 0;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: rgba(18, 20, 22, 0.95);
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 5;
    }

    th {
      background: #222;
      color: white;

      padding: 12px;
      cursor: pointer;

      border-bottom: 1px solid #444;

      font-size: 13px;
      font-weight: bold;

      white-space: nowrap;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #333;
      font-size: 13px;
    }

    tr:hover {
      background: rgba(0, 255, 153, 0.06);
    }

    /* SCROLLBAR */

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #111;
    }

    ::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 8px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #666;
    }

    /* RESPONSIVE */

    @media (max-width: 1200px) {

      .kpis {
        grid-template-columns: repeat(3, 1fr);
      }

      .buckets {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 700px) {

      .kpis {
        grid-template-columns: repeat(2, 1fr);
      }

      .buckets {
        grid-template-columns: repeat(2, 1fr);
      }

      th,
      td {
        font-size: 11px;
        padding: 8px;
      }
    }

  </style>
</head>

<body>

  <div class="app">

    <!-- TOP BUTTONS -->

    <div class="topbar">

      <button id="toggle-paste">
        Paste Raw Data
      </button>

      <button id="load-saved">
        Load Saved Data
      </button>

      <button id="clear-data">
        Clear Saved Data
      </button>

    </div>

    <!-- PASTE PANEL -->

    <div id="paste-panel" class="panel">

      <textarea
        id="raw-data"
        placeholder="Paste SimCompanies bond data here..."
      ></textarea>

      <br><br>

      <button id="save-load">
        Save & Load Data
      </button>

    </div>

    <!-- KPI SUMMARY -->

    <div class="panel kpis">

      <div class="kpi-card">
        <div class="kpi-title">Total Outstanding</div>
        <div id="kpi-total" class="kpi-value">$0</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-title">Callable</div>
        <div id="kpi-callable" class="kpi-value">$0</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-title">Recovery Value</div>
        <div id="kpi-recovery" class="kpi-value">$0</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-title">Weighted Risk Amount</div>
        <div id="kpi-risk" class="kpi-value">$0</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-title">Average Bond Amount</div>
        <div id="kpi-average" class="kpi-value">$0</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-title">Total Bond Count</div>
        <div id="kpi-count" class="kpi-value">0</div>
      </div>

    </div>

    <!-- CALLABLE BUCKETS -->

    <div class="panel">

      <div class="buckets" id="bucket-row"></div>

    </div>

    <!-- TABLE -->

    <div class="panel">

      <div class="table-wrap">

        <table>

          <thead>
            <tr id="table-head"></tr>
          </thead>

          <tbody id="table-body"></tbody>

        </table>

      </div>

    </div>

  </div>

  <script
    type="py"
    src="./main.py"
    config="./pyscript.json"
  ></script>

</body>

</html>
